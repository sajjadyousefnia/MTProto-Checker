name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ''
          - os: linux
            arch: arm64
            ext: ''
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.18'

      - name: Build
        run: |
          go build -ldflags="-X main.version=${{ github.ref_name }}" \
            -o mtproto-checker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} .
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: mtproto-checker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "notes=Initial release" >> $GITHUB_OUTPUT
            echo "prev=" >> $GITHUB_OUTPUT
          else
            LOG=$(git log $PREV_TAG..${{ github.ref_name }} --oneline --no-decorate)
            echo "prev=$PREV_TAG" >> $GITHUB_OUTPUT
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$LOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List files
        run: find . -name 'mtproto-checker-*' -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: binary-*/*
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            **Full changelog:** https://github.com/${{ github.repository }}/compare/${{ steps.changelog.outputs.prev }}...${{ github.ref_name }}
