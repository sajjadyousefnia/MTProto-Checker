name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ''
          - os: linux
            arch: arm64
            ext: ''
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.18'

      - name: Build
        run: |
          go build -ldflags="-X main.version=${{ github.ref_name }}" \
            -o mtproto-checker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} .

        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0

      - uses: softprops/action-gh-release@v2
        with:
          files: mtproto-checker-*
