<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto Ultimate Checker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <div class="header-controls">
        <label class="sound-toggle" title="Sound on finish">
            <input type="checkbox" id="soundCheck">
            <span class="sound-icon">🔔</span>
            <span class="sound-state" id="soundState">OFF</span>
        </label>
        <select id="langSelect" class="lang-select" onchange="changeLanguage(this.value)">
            <option value="fa">🇮🇷 فارسی</option>
            <option value="en">🇺🇸 English</option>
        </select>
    </div>

    <div>
        <h1 data-i18n="title">MTProto Pro Checker</h1>
        <p class="sub" data-i18n="subtitle">تست اتصال</p>
        
        <div class="progress-box"><div class="progress-bar" id="progressBar"></div></div>
        <div class="status-text" id="statusText" data-i18n="ready">آماده...</div>
    </div>

    <div class="grid">
        <div>
            <label data-i18n="inputLabel">📥 لیست ورودی</label>
            <textarea id="inputProxies" placeholder="..."></textarea>
            <div class="btn-row">
                <button class="btn-start" id="startBtn" onclick="startCheck()" data-i18n="startBtn">شروع بررسی</button>
                <button class="btn-pause" id="pauseBtn" onclick="togglePause()" style="display:none">⏸ توقف موقت</button>
                <label class="btn-file"><span data-i18n="fileBtn">📎 فایل</span>
                    <input type="file" id="fileInput" accept=".txt,.csv,.list" onchange="handleFileUpload(event)" style="display:none">
                </label>
            </div>
        </div>
        <div>
            <label data-i18n="outputLabel">🚀 لیست سالم</label>
            <textarea id="outputProxies" readonly placeholder="..."></textarea>
            <div class="btn-row">
                <button class="btn-copy" onclick="copyResults()" data-i18n="copyBtn">کپی لیست سالم</button>
                <button class="btn-export" onclick="exportResults('txt')" data-i18n="exportTxtBtn">💾 TXT</button>
                <button class="btn-export" onclick="exportResults('json')" data-i18n="exportJsonBtn">💾 JSON</button>
            </div>
        </div>
    </div>

    <div class="debug-console" id="console">
        > System Ready.
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/script.js"></script>
</body>
</html>
